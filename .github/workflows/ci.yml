# CI de Ágora Campus — Fase 1 (+ E2E en Fase 8)
# Jobs: lint-types, unit, build, integration (Postgres real vía service
# container) y e2e (Playwright contra el build de producción + Postgres).
name: CI

# El CI solo necesita leer el repo (hardening: sin permisos de escritura).
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones anteriores de la misma rama/PR para no gastar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-types:
    name: Lint y typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  unit:
    name: Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Vitest (unit)
        run: npm run test:unit

  build:
    name: Build de producción
    needs: lint-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Build Next.js
        run: npm run build

  integration:
    name: Tests de integración (Postgres)
    needs: lint-types
    runs-on: ubuntu-latest
    # Postgres real como service container; los tests NO usan mocks de BD.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        # Espera a que Postgres acepte conexiones antes de arrancar los steps.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Misma URL para migraciones, seed y tests.
      DATABASE_URL: postgres://postgres:test@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Aplicar migraciones
        run: npm run db:migrate
      - name: Poblar datos de prueba (seed)
        run: npm run db:seed
      - name: Vitest (integración)
        run: npm run test:integration

  e2e:
    name: Tests E2E (Playwright)
    needs: lint-types
    runs-on: ubuntu-latest
    # Mismo Postgres de servicio que el job integration: los E2E corren
    # contra la app real con BD real (migrada y con seed).
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        # Espera a que Postgres acepte conexiones antes de arrancar los steps.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Misma URL para migraciones, seed y el servidor que levanta Playwright.
      DATABASE_URL: postgres://postgres:test@localhost:5432/agora_test
      AUTH_SECRET: ci-secret
      # Habilita el bypass /api/test/login SOLO en esta corrida de CI.
      E2E_TEST_MODE: "true"
      # Sin filtro de IP del campus ni pg-boss durante los E2E.
      IP_GATE_ENABLED: "false"
      SKIP_JOBS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Aplicar migraciones
        run: npm run db:migrate
      - name: Poblar datos de prueba (seed)
        run: npm run db:seed
      # Cachea los binarios de Chromium entre corridas (keyed por lockfile).
      - name: Cache de navegadores de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Instalar Chromium de Playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright (E2E)
        run: npx playwright test
      # El reporte HTML solo interesa cuando algo falló.
      - name: Subir reporte de Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
